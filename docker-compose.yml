services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: mms_db
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - mms_db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

  tomcat:
    image: tomcat:9.0
    ports:
      - "8081:8080"
    volumes:
      - ./dist:/usr/local/tomcat/webapps
    depends_on:
      - db

volumes:
  mms_db_data: